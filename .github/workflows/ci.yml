name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Check unsafe example (expect fail)
        run: make check-unsafe

      - name: Check clean example (expect pass)
        run: make check-clean

      - name: Upload sample report
        uses: actions/upload-artifact@v4
        with:
          name: orca-report-clean
          path: |
            orca-report.json
            orca-report.md
